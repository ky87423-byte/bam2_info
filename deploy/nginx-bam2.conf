# /etc/nginx/sites-available/bam2 → sites-enabled 심볼릭 링크
# 도메인: bt-001.com (Njalla). HTTPS는 DNS 전파 후 certbot --nginx 로 적용 (이 파일 자동 수정됨).
server {
    listen 80 default_server;
    server_name bt-001.com www.bt-001.com;

    client_max_body_size 20m;

    # 이미지 정적 서빙: Next를 거치지 않고 nginx가 직접 (50GB 이미지 부하 분리)
    location /images/ {
        alias /var/www/bam2_info/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js 앱
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
